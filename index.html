<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <style>
  @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap');
  </style>
  
  <title>Frontend Mentor | Order summary card</title>

</head>
<body>
  <main class="container">
    <img src="images/illustration-hero.svg" alt="" class="content-background">

    <section class="content">
      <h2>Order Summary</h2>
      <p class="description">You can now listen to millions of songs, audiobooks, and podcasts on any 
  device anywhere you like!</p>

      <div class="subscription-plan">
        <div class="price">
          <img src="images/icon-music.svg" alt="">
          <div class="small-container">
          <p class="annual">Annual Plan</p>
          <p class="amount">$59.99/year</p>
          </div>
        </div>
        <a href="#">Change</a>
      </div>

      <button type="button">Proceed to Payment</button>
      <a class="cancel-order" href="#">Cancel Order</a>
    </section>
  </main>
</body>
</html>
